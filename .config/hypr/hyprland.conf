# My Hyprland Configuration
source=~/.config/hypr/mocha.conf

monitor=,preferred,auto,1

# Execs
exec-once=dunst
exec-once=hyprctl setcursor Bibata-Modern-Classic 24
exec-once=gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic'
exec-once=fcitx5
exec-once=waybar
exec-once=swaybg -i ~/.config/background


input {
    kb_layout=
    kb_variant=ffffff
    kb_model=
    kb_options=
    kb_rules=

    follow_mouse=1

    touchpad {
        natural_scroll=true
    }
}

misc {
    disable_hyprland_logo=true
}

general {
    sensitivity=1.0 # for mouse cursor
    gaps_in=10
    gaps_out=20
    border_size=0
    col.active_border=$surface0
    col.inactive_border=$base
}

decoration {
    rounding = 15
    active_opacity=0.95
    inactive_opacity=0.85
    
    # Shadow
    drop_shadow = false
    shadow_range = 20
    shadow_offset = 4 4
    shadow_render_power = 2
    col.shadow = $mantle
    
    blur {
        enabled = false
        size = 10
        passes = 2
    }
}


animations {
    enabled=1

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    # Animation configs
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert

}

dwindle {
    pseudotile=1 # enable pseudotiling on dwindle
    force_split=0
    preserve_split = true
}

master{
    
}

gestures {
    workspace_swipe=yes
    workspace_swipe_fingers=3
}


#Windows
windowrulev2 = animation fade, class:(rofi),title:(rofi)
#Applications
bind = SUPER,t,exec, alacritty
bind = SUPER,B,exec, blueberry
bind = ,Print ,exec,~/.config/hypr/scripts/screenshot
bind = SUPER,Q,killactive,
bind = SUPER,M,exit,
bind = SUPER_ALT,L,exec,swaylock
bindr = SUPER, SPACE, exec, rofi -show drun -normal-window || pkill rofi
bind = SUPER, P, togglefloating
bind = SUPER,N,exec,librewolf

#Workspaces
bind = SUPER,A,movefocus,l
bind = SUPER,D,movefocus,r
bind = SUPER,W,movefocus,u
bind = SUPER,S,movefocus,d

# bind = CTRL,1,workspace,1
# bind = CTRL,2,workspace,2
# bind = CTRL,3,workspace,3
# bind = CTRL,4,workspace,4
# bind = CTRL,5,workspace,5
# bind = CTRL,6,workspace,6
bind = SUPER,1,workspace,1
bind = SUPER,2,workspace,2
bind = SUPER,3,workspace,3
bind = SUPER,4,workspace,4
bind = SUPER,5,workspace,5
bind = SUPER,6,workspace,6
bind = SUPER,7,workspace,7
bind = SUPER,8,workspace,8
bind = SUPER,9,workspace,9
bind = SUPER,0,workspace,10

bind = SUPERALT,1,movetoworkspace,1
bind = SUPERALT,2,movetoworkspace,2
bind = SUPERALT,3,movetoworkspace,3
bind = SUPERALT,4,movetoworkspace,4
bind = SUPERALT,5,movetoworkspace,5
bind = SUPERALT,6,movetoworkspace,6
bind = SUPERALT,7,movetoworkspace,7
bind = SUPERALT,8,movetoworkspace,8
bind = SUPERALT,9,movetoworkspace,9
bind = SUPERALT,0,movetoworkspace,10

bind = SUPER_SHIFT,L,workspace,e+1
bind = SUPER_SHIFT,J,workspace,e-1

bind = SUPER SHIFT, A, movewindow, l
bind = SUPER SHIFT, D, movewindow, r
bind = SUPER SHIFT, W, movewindow, u
bind = SUPER SHIFT, S, movewindow, d 

#Media Buttons
bindl=, XF86AudioRaiseVolume, exec, pamixer -ui 5
bindl=, XF86AudioLowerVolume, exec, pamixer -ud 5
bindl=, XF86AudioMute, exec,pamixer --toggle-mute

bindle=, XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindle=, XF86MonBrightnessDown, exec, brightnessctl set 10%-

bindl=, XF86AudioPlay, exec, playerctl play-pause 
bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPrev, exec, playerctl previous

