

import:
  - ~/.config/alacritty/catppuccin/catppuccin-mocha.yml
env:
  TERM: xterm-256color

font:
  normal:
    family: JetBrainsMonoNerdFont
    style: Medium

  bold:
    family:  JetBrainsMonoNerdFont
    style: Bold

  italic:
    family:  JetBrainsMonoNerdFont
    style: Italic

  bold_italic:
    family:  JetBrainsMonoNerdFont
    style: Bold Italic

  size: 16


window:
  padding:
    x: 10
    y: 10
  dynamic_padding: true
  opacity: 1



cursor:
  style: 
    shape: Underline

  unfocused_hollow: false

keyboard:
  bindings: [
   {key="h", mods="Ctrl", action="Left"},
   {key="j", mods="Ctrl", action="Down"},
   {key="k", mods="Ctrl", action="Up"},
   {key="l", mods="Ctrl", action="Right"},
   {key="l", mods="Super", action="None"}

]

  
shell:
    program: zsh
